name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted   # runs on your EC2 Windows runner (frontend runner)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write Vite environment file
        run: |
          "VITE_API_URL=${{ secrets.VITE_API_URL }}" | Out-File -FilePath .env -Encoding utf8
        shell: powershell

      - name: Install dependencies
        run: npm ci
        shell: powershell

      - name: Build Vite app
        run: npm run build
        shell: powershell

      - name: Deploy dist to Nginx directory
        run: |
          Remove-Item -Recurse -Force E:\Avagama\frontend\dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path E:\Avagama\frontend\dist -Force
          Copy-Item -Recurse .\dist\* E:\Avagama\frontend\dist\
        shell: powershell

      - name: Reload Nginx
        run: C:\nginx\nginx-1.30.0\nginx.exe -s reload
        shell: powershell