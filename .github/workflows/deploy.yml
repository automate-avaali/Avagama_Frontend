name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted   # runs on your EC2 Windows runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          "${{ secrets.ENV_FILE }}" | Out-File -FilePath .env -Encoding utf8
        shell: powershell

      - name: Install production dependencies
        run: npm ci --omit=dev
        shell: powershell

      - name: Stop PM2 before file copy
        run: |
          pm2 stop avagama-backend
        shell: powershell

      - name: Copy app files to deployment directory
        run: |
          robocopy . E:\Avagama\backend /E /XD node_modules .git /XF .env
          if ($LASTEXITCODE -le 7) { $LASTEXITCODE = 0 }
          robocopy .\node_modules E:\Avagama\backend\node_modules /E
          if ($LASTEXITCODE -le 7) { $LASTEXITCODE = 0 }
          Copy-Item .env E:\Avagama\backend\.env -Force
        shell: powershell

      - name: Restart or Start PM2
        run: |
          Set-Location E:\Avagama\backend
          pm2 describe avagama-backend
          if ($LASTEXITCODE -eq 0) {
            pm2 restart avagama-backend
          } else {
            pm2 start app.js --name avagama-backend
            pm2 save
          }
        shell: powershell

      - name: Show PM2 status
        run: pm2 status
        shell: powershell
